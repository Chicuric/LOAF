<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATON OS: Bakery Console</title>
    <style>
        :root {
            --neon-color: #ff9f1c;
            --neon-glow: rgba(255, 159, 28, 0.4);
            --text-main: #ffa62b;
            --bg-dark: #100a06;
            --bg-panel: rgba(26, 18, 11, 0.65);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Consolas', 'Courier New', monospace; }
        body { background-color: var(--bg-dark); color: #ffffff; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        
        /* Эффект тепловой сетки печи */
        body::after { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(16, 10, 6, 0) 50%, rgba(0, 0, 0, 0.25) 50%); z-index: 9999; pointer-events: none; }
        
        /* Живой фон: Космическая мука и искры печи */
        .space-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index: -3; background: radial-gradient(circle at 50% 50%, #2a1b10 0%, #100a06 100%); }
        .stars { position: fixed; top:0; left:0; width:100%; height:100%; z-index: -2; background: radial-gradient(rgba(255,255,255,0.15), transparent 2%) 0 0; background-size: 300px 300px; animation: glow 4s infinite ease-in-out; }
        @keyframes glow { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }

        /* Экран Регистрации БАТОНА */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .auth-container { background: var(--bg-panel); padding: 45px; border: 2px solid var(--neon-color); box-shadow: 0 0 40px var(--neon-glow); text-align: center; max-width: 420px; width: 90%; clip-path: polygon(0 0, 92% 0, 100% 8%, 100% 100., 8% 100%, 0 92%); backdrop-filter: blur(20px); }
        
        /* CSS-Анимация Хлеба */
        .loaf-anim-box { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; height: 50px; }
        .css-loaf { width: 50px; height: 40px; border: 3px solid var(--neon-color); border-radius: 15px 15px 8px 8px; position: relative; filter: drop-shadow(0 0 8px var(--neon-color)); animation: floatLoaf 3s ease-in-out infinite; }
        .css-loaf::before { content: ''; position: absolute; top: 8px; left: 8px; width: 3px; height: 12px; background: var(--neon-color); transform: rotate(25deg); border-radius: 2px; box-shadow: 12px 0 var(--neon-color), 24px 0 var(--neon-color); }
        .css-loaf.two { animation-delay: 1.5s; transform: scale(0.8); margin-top: 10px; }
        @keyframes floatLoaf { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-8px) rotate(4deg); } }

        .glitch-title { color: #ffffff; font-size: 38px; font-weight: 900; margin-bottom: 5px; text-shadow: 0 0 15px var(--neon-color); letter-spacing: 4px; }
        .auth-container p { color: var(--text-main); margin-bottom: 35px; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; }
        .auth-container input { width: 100%; padding: 16px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,159,28,0.2); border-bottom: 2px solid var(--text-main); color: #fff; font-size: 15px; margin-bottom: 30px; outline: none; }
        .auth-container input:focus { border-color: #fff; box-shadow: 0 0 15px var(--neon-glow); }
        .auth-container button { width: 100%; padding: 15px; background: var(--neon-color); border: none; color: #000; font-size: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        /* Интерфейс Главной Печи */
        #app-container { display: flex; width: 100%; height: 100vh; padding: 25px; gap: 25px; }
        .sidebar { width: 300px; background: var(--bg-panel); border: 1px solid rgba(255, 255, 255, 0.03); border-left: 2px solid var(--neon-color); backdrop-filter: blur(25px); display: flex; flex-direction: column; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .sidebar h2 { color: #ffffff; font-size: 14px; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; border-left: 3px solid var(--neon-color); padding-left: 10px; }
        
        .nav-tabs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .nav-btn { padding: 14px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.02); color: #6e5c51; text-align: left; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .nav-btn.active { color: #000; background: var(--text-main); border-color: var(--text-main); box-shadow: 0 0 15px var(--neon-glow); font-weight: 900; }

        .content-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-panel); border: 1px solid rgba(255, 255, 255, 0.03); border-right: 2px solid var(--neon-color); backdrop-filter: blur(25px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .main-window { display: none; flex-direction: column; height: 100%; }
        .main-window.active { display: flex; }
        
        .chat-header { height: 65px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; padding: 0 25px; }
        .chat-header h3 { color: #fff; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.9; }
        
        /* Хлебные сообщения */
        .messages-container { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }
        .message { background: rgba(12, 8, 5, 0.8); padding: 14px 18px; border: 1px solid rgba(255, 255, 255, 0.02); border-left: 3px solid var(--neon-color); max-width: 68%; align-self: flex-start; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .message.my-msg { align-self: flex-end; border-left: none; border-right: 3px solid var(--text-main); background: rgba(255, 159, 28, 0.02); }
        .msg-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--neon-color); margin-bottom: 6px; font-weight: bold; gap: 40px; }
        .msg-time { color: #55443a; font-weight: normal; }
        .msg-text { color: rgba(255,255,255,0.95); font-size: 14px; line-height: 1.5; }

        .input-area { padding: 25px; background: rgba(0,0,0,0.3); display: flex; gap: 20px; }
        .input-area input { flex: 1; padding: 16px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.03); color: #ffffff; outline: none; }
        .input-area button { padding: 0 35px; background: var(--neon-color); border: none; color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; clip-path: polygon(0 0, 85% 0, 100% 30%, 100% 100%, 0 100%); }
        
        /* Вкладка Корешей */
        .friends-box { padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .friend-input-group { display: flex; gap: 15px; }
        .friend-input-group input { flex: 1; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.03); color: #fff; outline: none; }
        .friend-input-group button { padding: 0 30px; background: var(--text-main); border: none; color: #000; font-weight: bold; cursor: pointer; }
        .friend-item { padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; }
        .friend-status { width: 8px; height: 8px; background: var(--text-main); box-shadow: 0 0 10px var(--text-main); border-radius: 50%; }

        .sys-btn { margin-top: auto; padding: 11px; background: rgba(255,0,85,0.05); border: 1px solid #ff0055; color: #ff0055; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="space-bg"></div>
    <div class="stars"></div>

    <!-- ТЕРМИНАЛ ХЛЕБА -->
    <div id="auth-screen">
        <div class="auth-container">
            <div class="loaf-anim-box">
                <div class="css-loaf"></div>
                <div class="css-loaf two"></div>
            </div>
            <div class="glitch-title">BATON OS</div>
            <p>> BAKERY CORES // REGISTRATION v6.0</p>
            <input type="text" id="username-input" placeholder="НАРЕЖЬТЕ СВОЙ НИКНЕЙМ..." maxlength="15" autocomplete="off">
            <button id="login-btn">НАРЕЗАТЬ ПРОФИЛЬ</button>
        </div>
    </div>

    <!-- КОНСОЛЬ -->
    <div id="app-container">
        <div class="sidebar">
            <h2>// СТАТУС ПЕЧИ</h2>
            <div style="color: var(--text-main); font-size: 11px; margin-bottom: 25px;" id="user-status">> ПЕКАРЬ: OFFLINE</div>
            
            <div class="nav-tabs">
                <button class="nav-btn active" id="tab-chat" onclick="switchWindow('chat')">> ГЛАВНАЯ ПЕЧЬ</button>
                <button class="nav-btn" id="tab-friends" onclick="switchWindow('friends')">> БАТУТЫ-КОРЕША</button>
            </div>

            <button class="sys-btn" onclick="clearProfile()">[X] ИЗВЛЕЧЬ БАТON (СБРОС)</button>
        </div>

        <div class="content-area">
            <!-- ТЕРМИНАЛ ЧАТА -->
            <div id="window-chat" class="main-window active">
                <div class="chat-header">
                    <h3 id="chat-title">> ПОДКЛЮЧЕНИЕ К ХЛЕБНОЙ СЕТИ...</h3>
                </div>
                <div class="messages-container" id="messages-box"></div>
                <div class="input-area">
                    <input type="text" id="msg-input" placeholder="Закиньте строчку в печь..." autocomplete="off">
                    <button id="send-btn">BAKE</button>
                </div>
            </div>

            <!-- ОКНО КОРЕШЕЙ -->
            <div id="window-friends" class="main-window">
                <div class="chat-header">
                    <h3>> СПИСОК НАРЕЗАННЫХ КОРЕШЕЙ В СЕТИ</h3>
                </div>
                <div class="friends-box">
                    <div class="friend-input-group">
                        <input type="text" id="friend-username" placeholder="Вбейте никнейм кореша..." autocomplete="off">
                        <button onclick="addFriend()">ДОБАВИТЬ</button>
                    </div>
                    <ul class="friends-list" id="friends-list-box"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem('loaf_standalone_user') || "";
        let myFriends = JSON.parse(localStorage.getItem('loaf_friends_list')) || [];
        
        const authScreen = document.getElementById('auth-screen');
        const usernameInput = document.getElementById('username-input');
        const loginBtn = document.getElementById('login-btn');
        const messagesBox = document.getElementById('messages-box');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const userStatus = document.getElementById('user-status');
        const friendsListBox = document.getElementById('friends-list-box');

        if (currentUser) {
            authScreen.style.display = 'none';
            userStatus.innerText = `> ПЕКАРЬ: ${currentUser} [ONLINE]`;
            loadLocalMessages();
        }

        loginBtn.addEventListener('click', () => {
            const name = usernameInput.value.trim();
            if (name) {
                currentUser = name;
                localStorage.setItem('loaf_standalone_user', name);
                authScreen.style.display = 'none';
                userStatus.innerText = `> ПЕКАРЬ: ${name} [ONLINE]`;
                saveMessage({ username: "SYSTEM_BAKE", text: `Профиль пекаря ${name} успешно выпечен и сохранен на локальном хосте.`, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
            }
        });

        function switchWindow(target) {
            document.querySelectorAll('.main-window').forEach(w => w.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`window-${target}`).classList.add('active');
            document.getElementById(`tab-${target}`).classList.add('active');
            if (target === 'friends') renderFriends();
        }

        function sendMessage() {
            const text = msgInput.value.trim();
            if (text) {
                const now = new Date();
                const msgData = {
                    username: currentUser,
                    text: text,
                    time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                };
                saveMessage(msgData);
                msgInput.value = "";
                
                // Эмуляция угарных хлебных ответов от напарников
                if (myFriends.length > 0) {
                    setTimeout(() => {
                        const randomFriend = myFriends[Math.floor(Math.random() * myFriends.length)];
                        const breadJokes = [
                            `Батон на связи! Пакет данных "${text}" успешно поджарен и принят!`,
                            `Всё четко, словил сообщение. Не кроши батон на сеть, тут всё летает!`,
                            `Соединение стабильное, как свежая буханка. Пиши еще!`,
                            `Пакет доставлен свежим прямо из печи!`
                        ];
                        const joke = breadJokes[Math.floor(Math.random() * breadJokes.length)];
                        saveMessage({ 
                            username: randomFriend, 
                            text: joke, 
                            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
                        });
                    }, 1200);
                }
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        function saveMessage(msgData) {
            let history = JSON.parse(localStorage.getItem('loaf_msg_history')) || [];
            history.push(msgData);
            localStorage.setItem('loaf_msg_history', JSON.stringify(history));
            displayMessage(msgData);
        }

        function loadLocalMessages() {
            let history = JSON.parse(localStorage.getItem('loaf_msg_history')) || [];
            history.forEach(msg => displayMessage(msg));
        }

        function displayMessage(data) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            if (data.username === currentUser) msgDiv.classList.add('my-msg');
            if (data.username === "SYSTEM_BAKE") msgDiv.style.borderLeftColor = "var(--text-main)";
            msgDiv.innerHTML = `
                <div class="msg-meta"><span>// ${data.username}</span><span class="msg-time">${data.time}</span></div>
                <div class="msg-text">${data.text}</div>
            `;
            messagesBox.appendChild(msgDiv);
            messagesBox.scrollTop = messagesBox.scrollHeight;
        }

        function addFriend() {
            const fInput = document.getElementById('friend-username');
            const fName = fInput.value.trim();
            if (fName && fName !== currentUser && !myFriends.includes(fName)) {
                myFriends.push(fName);
                localStorage.setItem('loaf_friends_list', JSON.stringify(myFriends));
                fInput.value = "";
                renderFriends();
                saveMessage({ username: "SYSTEM_BAKE", text: `Кореш ${fName} добавлен в список. Теперь он может отвечать в общей печи!`, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
            }
        }

        function removeFriend(index) {
            myFriends.splice(index, 1);
            localStorage.setItem('loaf_friends_list', JSON.stringify(myFriends));
            renderFriends();
        }

        function renderFriends() {
            friendsListBox.innerHTML = "";
            if (myFriends.length === 0) {
                friendsListBox.innerHTML = `<li style="color: #443325; font-style: italic; list-style:none;">ПЕЧЬ КОНТАКТОВ ПУСТА</li>`;
                return;
            }
            myFriends.forEach((name, idx) => {
                const li = document.createElement('li');
                li.classList.add('friend-item');
                li.innerHTML = `
                    <span>> ${name}</span>
                    <div style="display:flex; gap:15px; align-items:center;">
                        <div class="friend-status"></div>
                        <button onclick="removeFriend(${idx})" style="background:none; border:none; color:#ff0055; cursor:pointer; font-size:11px;">[X] СЪЕСТЬ</button>
                    </div>
                `;
                friendsListBox.appendChild(li);
            });
        }

        function clearProfile() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
